<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Log in to your account.">
    <title>Login — MyApp</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link href="css/style.css" rel="stylesheet">
</head>
<body>

    <div class="auth-container">
        <div class="auth-card">

            <!-- Logo / Header -->
            <div class="logo-area">
                <div class="logo-icon"><i class="bi bi-box-arrow-in-right"></i></div>
                <h2>Welcome Back</h2>
                <p>Enter your credentials to login</p>
            </div>

            <!-- Alert Message -->
            <div id="alertMessage" class="alert-message" role="alert"></div>

            <!-- Login Form (jQuery AJAX only) -->
            <div id="loginForm">
                <div class="form-floating">
                    <input type="email" class="form-control" id="loginEmail" placeholder="Email Address" required>
                    <label for="loginEmail"><i class="bi bi-envelope"></i> Email Address</label>
                </div>

                <div class="form-floating">
                    <input type="password" class="form-control" id="loginPassword" placeholder="Password" required>
                    <label for="loginPassword"><i class="bi bi-lock"></i> Password</label>
                </div>

                <button type="button" class="btn btn-primary-custom" id="btnLogin">
                    <span id="btnText">Login</span>
                    <span id="btnSpinner" class="spinner-border spinner-border-sm d-none" role="status"></span>
                </button>
            </div>

            <!-- Link to Register -->
            <div class="auth-link">
                Don't have an account? <a href="register.html">Register here</a>
            </div>
        </div>
    </div>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script src="js/login.js"></script>
</body>
</html>
