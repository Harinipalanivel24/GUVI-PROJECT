<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Create your account to get started.">
    <title>Register — MyApp</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link href="css/style.css" rel="stylesheet">
</head>
<body>

    <div class="auth-container">
        <div class="auth-card">

            <!-- Logo / Header -->
            <div class="logo-area">
                <div class="logo-icon"><i class="bi bi-person-plus-fill"></i></div>
                <h2>Create Account</h2>
                <p>Fill in the details below to register</p>
            </div>

            <!-- Alert Message -->
            <div id="alertMessage" class="alert-message" role="alert"></div>

            <!-- Registration Form (NO <form> submission — jQuery AJAX only) -->
            <div id="registerForm">
                <div class="form-floating">
                    <input type="text" class="form-control" id="regName" placeholder="Full Name" required>
                    <label for="regName"><i class="bi bi-person"></i> Full Name</label>
                </div>

                <div class="form-floating">
                    <input type="email" class="form-control" id="regEmail" placeholder="Email Address" required>
                    <label for="regEmail"><i class="bi bi-envelope"></i> Email Address</label>
                </div>

                <div class="form-floating">
                    <input type="password" class="form-control" id="regPassword" placeholder="Password" required>
                    <label for="regPassword"><i class="bi bi-lock"></i> Password</label>
                </div>

                <div class="form-floating">
                    <input type="password" class="form-control" id="regConfirmPassword" placeholder="Confirm Password" required>
                    <label for="regConfirmPassword"><i class="bi bi-lock-fill"></i> Confirm Password</label>
                </div>

                <button type="button" class="btn btn-primary-custom" id="btnRegister">
                    <span id="btnText">Register</span>
                    <span id="btnSpinner" class="spinner-border spinner-border-sm d-none" role="status"></span>
                </button>
            </div>

            <!-- Link to Login -->
            <div class="auth-link">
                Already have an account? <a href="login.html">Login here</a>
            </div>
        </div>
    </div>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script src="js/register.js"></script>
</body>
</html>
