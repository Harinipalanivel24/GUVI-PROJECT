<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Manage your profile details.">
    <title>Profile — MyApp</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link href="css/style.css" rel="stylesheet">
</head>
<body>

    <div class="profile-container">
        <div class="profile-card">

            <!-- Profile Header -->
            <div class="profile-header">
                <div class="profile-avatar" id="profileAvatar">?</div>
                <div class="profile-info">
                    <h3 id="profileName">Loading...</h3>
                    <p id="profileEmail">loading@example.com</p>
                </div>
            </div>

            <!-- Alert Message -->
            <div id="alertMessage" class="alert-message" role="alert"></div>

            <!-- Section Title -->
            <div class="section-title">
                <i class="bi bi-pencil-square"></i> Personal Details
            </div>

            <!-- Profile Form (jQuery AJAX only) -->
            <div id="profileForm">
                <div class="row">
                    <div class="col-md-6">
                        <div class="form-floating">
                            <input type="number" class="form-control" id="profileAge" placeholder="Age" min="1" max="150">
                            <label for="profileAge">Age</label>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="form-floating">
                            <input type="date" class="form-control" id="profileDob" placeholder="Date of Birth">
                            <label for="profileDob">Date of Birth</label>
                        </div>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6">
                        <div class="form-floating">
                            <input type="tel" class="form-control" id="profileContact" placeholder="Contact Number">
                            <label for="profileContact">Contact Number</label>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="form-floating">
                            <select class="form-select" id="profileGender">
                                <option value="" selected disabled>Select</option>
                                <option value="Male">Male</option>
                                <option value="Female">Female</option>
                                <option value="Other">Other</option>
                            </select>
                            <label for="profileGender">Gender</label>
                        </div>
                    </div>
                </div>

                <div class="form-floating">
                    <input type="text" class="form-control" id="profileAddress" placeholder="Address">
                    <label for="profileAddress">Address</label>
                </div>

                <div class="form-floating">
                    <textarea class="form-control" id="profileBio" placeholder="Bio"></textarea>
                    <label for="profileBio">Bio</label>
                </div>

                <!-- Action Buttons -->
                <div class="btn-group-custom">
                    <button type="button" class="btn btn-primary-custom" id="btnSave">
                        <span id="btnSaveText"><i class="bi bi-check-lg"></i> Save Profile</span>
                        <span id="btnSaveSpinner" class="spinner-border spinner-border-sm d-none" role="status"></span>
                    </button>
                    <button type="button" class="btn btn-outline-custom" id="btnLogout">
                        <i class="bi bi-box-arrow-right"></i> Logout
                    </button>
                </div>
            </div>

        </div>
    </div>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script src="js/profile.js"></script>
</body>
</html>
